name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: python3 -m unittest discover -s tests -q
      - name: Audit this repo's agent instructions
        run: python3 cursorrules_doctor.py . --sarif cursorrules-doctor.sarif || true
